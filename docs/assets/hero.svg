    <rect x="327" y="202" width="170" height="74" rx="12" fill="#142936" stroke="#7CC7FF" stroke-width="2"/>
    <rect x="562" y="202" width="170" height="74" rx="12" fill="#142936" stroke="#7CC7FF" stroke-width="2"/>
