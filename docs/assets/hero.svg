    <text x="124" y="350" fill="#9FB0C3" font-size="14">interfaces, pipeline, tests</text>

    <text x="414" y="324" fill="#FFFFFF" font-size="20" font-weight="800">Skill Context</text>
    <text x="414" y="350" fill="#9FB0C3" font-size="14">rules, references, examples</text>

    <text x="702" y="324" fill="#FFFFFF" font-size="20" font-weight="800">Runtime</text>
    <text x="702" y="350" fill="#9FB0C3" font-size="14">prompt, extract, validate</text>

    <text x="990" y="324" fill="#FFFFFF" font-size="20" font-weight="800">Evidence</text>
    <text x="990" y="350" fill="#9FB0C3" font-size="14">artifacts, reports, traces</text>
  </g>

  <g transform="translate(88 432)" font-family="Inter, Segoe UI, Arial, sans-serif">
