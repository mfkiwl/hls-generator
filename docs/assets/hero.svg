    <text x="0" y="98" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">HLS Generator</text>
    <text x="2" y="140" fill="#A9B8C8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Structured Vitis HLS workflows for AI coding agents</text>
  </g>

