  <path d="M315 232 L327 239 L315 246 M550 232 L562 239 L550 246 M785 232 L797 239 L785 246" stroke="#EAF6FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="130" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Intent Spec</text>
  <text x="123" y="256" fill="#A9C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">confirmed HLS contract</text>
  <text x="369" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Skill</text>
