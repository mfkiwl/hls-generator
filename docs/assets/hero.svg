    <rect x="670" y="286" width="214" height="88" rx="18" fill="#0F2233" stroke="#58A6FF" stroke-width="1.6"/>
    <rect x="958" y="286" width="214" height="88" rx="18" fill="#0F2233" stroke="#F7C948" stroke-width="1.6"/>

    <path d="M308 330H382M596 330H670M884 330H958" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round"/>
    <path d="M370 320L382 330L370 340M658 320L670 330L658 340M946 320L958 330L946 340" stroke="#D8E7F5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

