<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HLS Generator hero</title>
  <desc id="desc">A polished technical banner for an agent skill that converts confirmed hardware intent into Vitis HLS artifacts and validation evidence.</desc>
  <defs>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 122) rotate(143) scale(620 290)">
      <stop stop-color="#4DD4AC" stop-opacity="0.48"/>
      <stop offset="0.52" stop-color="#1C7ED6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#08111F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.55" stop-color="#0D1B2A"/>
      <stop offset="1" stop-color="#071019"/>
    </linearGradient>
    <linearGradient id="stroke" x1="168" y1="322" x2="1020" y2="322" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39D98A"/>
      <stop offset="0.5" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#F7C948"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="190%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="520" rx="28" fill="url(#glowA)"/>
  <g opacity="0.13">
