<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HLS Generator 工作流</title>
  <desc id="desc">从需求确认到证据报告的五步 HLS 生成工作流。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.58" stop-color="#0D1B2A"/>
      <stop offset="1" stop-color="#071019"/>
    </linearGradient>
    <linearGradient id="track" x1="128" y1="190" x2="1152" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39D98A"/>
      <stop offset="0.5" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#F7C948"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-46%" width="136%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="17" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1280" height="340" rx="26" fill="url(#bg)"/>
  <g opacity="0.14">
    <path d="M88 104H1192M88 184H1192M88 264H1192" stroke="#E6EDF3"/>
    <path d="M112 290h70v-36h70v36h70v-36h70v36h70v-36h70v36h70v-36h70v36h70v-36h70v36h70v-36h70" stroke="#E6EDF3" stroke-width="2"/>
  </g>
  <g font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif">
    <text x="72" y="58" fill="#E6EDF3" font-size="17" font-weight="800" letter-spacing="3">WORKFLOW</text>
    <text x="72" y="91" fill="#9FB0C3" font-size="18">带验证门禁的 HLS 生成路径，最终输出可追溯证据。</text>
  </g>
  <path d="M128 190H1152" stroke="url(#track)" stroke-width="5" stroke-linecap="round"/>
  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif">
    <g transform="translate(80 136)">
      <rect width="170" height="108" rx="18" fill="#0F2233" stroke="#39D98A" stroke-width="1.7"/>
      <circle cx="34" cy="34" r="18" fill="#39D98A"/><text x="28" y="41" fill="#08111F" font-size="18" font-weight="900">1</text>
      <text x="28" y="73" fill="#FFFFFF" font-size="21" font-weight="800">确认</text>
      <text x="28" y="98" fill="#9FB0C3" font-size="14">kernel 意图</text>
    </g>
    <g transform="translate(306 136)">
      <rect width="170" height="108" rx="18" fill="#0F2233" stroke="#58A6FF" stroke-width="1.7"/>
      <circle cx="34" cy="34" r="18" fill="#58A6FF"/><text x="28" y="41" fill="#08111F" font-size="18" font-weight="900">2</text>
      <text x="28" y="73" fill="#FFFFFF" font-size="21" font-weight="800">规格</text>
      <text x="28" y="98" fill="#9FB0C3" font-size="14">接口 + 检查</text>
    </g>
    <g transform="translate(532 136)">
      <rect width="170" height="108" rx="18" fill="#0F2233" stroke="#58A6FF" stroke-width="1.7"/>
      <circle cx="34" cy="34" r="18" fill="#58A6FF"/><text x="28" y="41" fill="#08111F" font-size="18" font-weight="900">3</text>
      <text x="28" y="73" fill="#FFFFFF" font-size="21" font-weight="800">生成</text>
      <text x="28" y="98" fill="#9FB0C3" font-size="14">HLS 文件</text>
    </g>
    <g transform="translate(758 136)">
      <rect width="170" height="108" rx="18" fill="#0F2233" stroke="#58A6FF" stroke-width="1.7"/>
      <circle cx="34" cy="34" r="18" fill="#58A6FF"/><text x="28" y="41" fill="#08111F" font-size="18" font-weight="900">4</text>
      <text x="28" y="73" fill="#FFFFFF" font-size="21" font-weight="800">验证</text>
      <text x="28" y="98" fill="#9FB0C3" font-size="14">静态或 Vitis</text>
    </g>
    <g transform="translate(984 136)">
      <rect width="170" height="108" rx="18" fill="#0F2233" stroke="#F7C948" stroke-width="1.7"/>
      <circle cx="34" cy="34" r="18" fill="#F7C948"/><text x="28" y="41" fill="#08111F" font-size="18" font-weight="900">5</text>
      <text x="28" y="73" fill="#FFFFFF" font-size="21" font-weight="800">报告</text>
      <text x="28" y="98" fill="#9FB0C3" font-size="14">证据包</text>
    </g>
  </g>
</svg>
