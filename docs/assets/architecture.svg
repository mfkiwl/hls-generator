    <text x="170" y="22" fill="#D8E7F5" font-size="13" font-weight="700">Deterministic Runtime</text>
    <text x="334" y="22" fill="#D8E7F5" font-size="13" font-weight="700">Vitis HLS Boundary</text>
  </g>
