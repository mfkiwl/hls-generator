<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HLS Generator skill architecture</title>
  <desc id="desc">A five-stage architecture from agent request to validated Vitis HLS evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.58" stop-color="#0D1B2A"/>
      <stop offset="1" stop-color="#071019"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 70) rotate(150) scale(560 230)">
      <stop stop-color="#4DD4AC" stop-opacity="0.42"/>
      <stop offset="0.52" stop-color="#1C7ED6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#08111F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow" x1="260" y1="206" x2="1020" y2="206" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39D98A"/>
      <stop offset="0.5" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#F7C948"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-38%" width="136%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="360" rx="26" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="26" fill="url(#glow)"/>
  <g opacity="0.12">
    <path d="M72 112H1208M72 192H1208M72 272H1208" stroke="#E6EDF3"/>
    <path d="M160 52V314M320 52V314M480 52V314M640 52V314M800 52V314M960 52V314M1120 52V314" stroke="#E6EDF3"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="58" fill="#E6EDF3" font-size="17" font-weight="800" letter-spacing="3">SKILL ARCHITECTURE</text>
    <text x="72" y="91" fill="#9FB0C3" font-size="18">How the skill turns confirmed hardware intent into Vitis-ready evidence.</text>
  </g>
  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="70" y="156" width="190" height="100" rx="18" fill="#0F2233" stroke="#39D98A" stroke-width="1.7"/>
    <rect x="306" y="156" width="190" height="100" rx="18" fill="#0F2233" stroke="#58A6FF" stroke-width="1.7"/>
    <rect x="542" y="156" width="190" height="100" rx="18" fill="#0F2233" stroke="#58A6FF" stroke-width="1.7"/>
    <rect x="778" y="156" width="190" height="100" rx="18" fill="#0F2233" stroke="#58A6FF" stroke-width="1.7"/>
    <rect x="1014" y="156" width="190" height="100" rx="18" fill="#0F2233" stroke="#F7C948" stroke-width="1.7"/>
    <path d="M260 206H306M496 206H542M732 206H778M968 206H1014" stroke="url(#flow)" stroke-width="4" stroke-linecap="round"/>
    <path d="M294 196L306 206L294 216M530 196L542 206L530 216M766 196L778 206L766 216M1002 196L1014 206L1002 216" stroke="#D8E7F5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="96" y="194" fill="#FFFFFF" font-size="21" font-weight="800">Agent Request</text>
    <text x="96" y="224" fill="#9FB0C3" font-size="15">intent + constraints</text>
    <text x="332" y="194" fill="#FFFFFF" font-size="21" font-weight="800">Skill Contract</text>
    <text x="332" y="224" fill="#9FB0C3" font-size="15">metadata + SKILL.md</text>
    <text x="568" y="194" fill="#FFFFFF" font-size="21" font-weight="800">Runtime Helpers</text>
    <text x="568" y="224" fill="#9FB0C3" font-size="15">scaffold, prompt</text>
    <text x="804" y="194" fill="#FFFFFF" font-size="21" font-weight="800">Vitis Artifacts</text>
    <text x="804" y="224" fill="#9FB0C3" font-size="15">C/C++, cfg, reports</text>
    <text x="1040" y="194" fill="#FFFFFF" font-size="21" font-weight="800">Evidence</text>
    <text x="1040" y="224" fill="#9FB0C3" font-size="15">findings + traces</text>
  </g>
  <g transform="translate(72 298)" font-family="Inter, Segoe UI, Arial, sans-serif">
